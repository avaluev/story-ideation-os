schema_version: "1.0"
last_verified: "2026-05-07T00:00:00Z"

# Categories A..J live in this file's `sources:` list (existing miner buckets).
# Categories K..R live in dedicated cross-domain catalog files (V4A-003a,
# Track B Knowledge Layer). The phase-1-miner-cross-domain agent consults
# this index plus the per-domain files to know which endpoints to query.
cross_domain_catalogs:
  - path: "sources/books.yaml"
    category: "K"
    name: "Books / Literature / Philosophy / Religion / Speculative Fiction"
  - path: "sources/sciences.yaml"
    category: "L"
    name: "Sciences — Physics / Bio / Chem / Neuro / Astro"
  - path: "sources/medicine.yaml"
    category: "M"
    name: "Medicine — Clinical / Rare Disease / Public Health"
  - path: "sources/arts.yaml"
    category: "N"
    name: "Arts — Painting / Sculpture / Architecture / Decorative"
  - path: "sources/documentary.yaml"
    category: "O"
    name: "Documentary — Festival / Archive / Cinematheque"
  - path: "sources/animation.yaml"
    category: "P"
    name: "Animation — Cinema-Grade / Festival / Anime"
  - path: "sources/history.yaml"
    category: "Q"
    name: "History — Events / Biographies / Civilizations / Archaeology"
  - path: "sources/music.yaml"
    category: "R"
    name: "Music & Performance — Recordings / Performances / Composition"

quotas:
  openrouter_paid_per_day: 1000
  openrouter_free_per_day: 50
  daily_usd_cap: 1000
  monthly_usd_cap: 25000
  phase_3_sonar_call_cap: 10

untapped_check_strategy:
  default:
    method: "cross-search"
    targets: ["wikipedia", "letterboxd", "imdb"]
    rule: "an asset is 'untapped' if it does NOT appear in 2+ of: Wikipedia 'In popular culture' section; a Letterboxd list with >=10 films; an IMDb 'connections to' graph"
  per_category_overrides:
    A:
      method: "case-citation-count"
      threshold: "<5 popular-press refs in last 10y"
    B:
      method: "PubMed-and-IMDb-cross"
      threshold: "case report exists AND no IMDb dramatization"
    C:
      method: "declassification-recency"
      threshold: "declassified <5y ago"

