name: Audit data-sources weekly

on:
  schedule:
    # Every Monday at 06:00 UTC
    - cron: '0 6 * * 1'
  workflow_dispatch: # Allow manual trigger from the GitHub UI

permissions:
  contents: write      # needed to push branch + open PR
  pull-requests: write # needed to open PR

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        run: pip install uv

      - name: uv sync (dev deps)
        run: uv sync --dev

      - name: Run make audit-sources (ONLINE by default)
        id: audit
        run: |
          set +e
          make audit-sources
          echo "audit_exit=$?" >> "$GITHUB_OUTPUT"
          set -e

      - name: Open PR on FAIL
        if: steps.audit.outputs.audit_exit != '0'
        uses: peter-evans/create-pull-request@v6
        with:
          branch: audit-sources-weekly-${{ github.run_id }}
          title: "fix(P1/01-02): audit-sources weekly FAIL"
          body: |
            Weekly audit-sources cron detected one or more endpoint failures.

            The audit JSON report is **NOT committed to the repo** -- download it from this
            workflow run's "Artifacts" panel (artifact name: `audit-sources-report`).

            Fix path:
            1. Open the artifact and inspect each FAILED source_id and HEAD status.
            2. If the host is a legitimate provider that flipped to bot-block, add it to
               `ALLOW_LISTED_BOT_BLOCK_HOSTS` in `scripts/audit.py` with a one-line
               justification in the commit message.
            3. If the host went genuinely dark, replace it with a deep-path equivalent
               from another category sibling.
            4. Re-run `make audit-sources` locally to confirm green.
            5. Merge.

            Pitfall 5.1 mitigation layer 2 (weekly cron).
            Layer 1 = write-time check (phase gate in plan 01-05).
            Layer 3 = quarterly manual review.
          add-paths: |
            sources/data-sources.yaml
          commit-message: "chore(P1/01-02): weekly audit-sources fix"

      - name: Upload audit report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: audit-sources-report
          path: data/audit/sources_*.json
          retention-days: 30
